  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - tqdm
  - pyyaml
  - einops
  - pytorch
  - torchvision
