name: floorplan-env
channels:
  - pytorch
  - pyg
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core
  - numpy
  - pandas
  - scipy
  - matplotlib
  - tqdm
  - pyyaml

  # PyTorch
  - pytorch
  - torchvision
  - torchaudio

  # PyTorch Geometric (GNN)
  - pytorch-geometric

  # FAISS (retrieval)
  - faiss-cpu

  # Notebook (opzionale ma utile)
  - jupyter

  # pip packages (se servono extra)
  - pip:
      - networkx