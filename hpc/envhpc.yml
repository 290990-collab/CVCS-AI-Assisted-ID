# HPC: GPU

name: floorplan-env
channels:
  - pytorch
  - pyg
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - tqdm
  - pyyaml
  - einops
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8       
  - pyg
  - pytorch-geometric
  - faiss-gpu                
  - hydra-core
  - pytest
  - black
  - isort
  - pip:
      - networkx
      - diffusers
      - transformers
      - scikit-learn
      - pillow
      - ipykernel
      - ipython
      - wandb=0.18.1
      - tornado
